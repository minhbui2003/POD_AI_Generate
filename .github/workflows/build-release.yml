name: Build & Release Windows

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tool_image

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set build version from tag
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}".TrimStart("v")
          $content = Get-Content config.py -Raw
          $content = $content -replace 'CURRENT_VERSION = ".*"', "CURRENT_VERSION = `"$version`""
          Set-Content config.py $content -Encoding UTF8
          Write-Host "Build version: $version"

      - name: Create Windows icon
        shell: pwsh
        run: |
          python -c "from PIL import Image; img=Image.open('Logo.png').convert('RGBA'); img.save('Logo.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Build Windows exe
        run: pyinstaller clipart_tool.spec --noconfirm --clean

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: tool_image/dist/POD_Generate_IMG.exe

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./artifacts/windows

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Calculate SHA256 checksum
        id: checksum
        run: |
          WIN_SHA256=$(sha256sum ./artifacts/windows/POD_Generate_IMG.exe | awk '{print $1}')
          echo "WIN_SHA256=$WIN_SHA256" >> $GITHUB_OUTPUT
          echo "Windows SHA256: $WIN_SHA256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "POD Image v${{ steps.get_version.outputs.VERSION }}"
          body: "Version ${{ steps.get_version.outputs.VERSION }}"
          files: ./artifacts/windows/POD_Generate_IMG.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version.json
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          WIN_SHA=${{ steps.checksum.outputs.WIN_SHA256 }}
          TAG_NAME=${GITHUB_REF#refs/tags/}

          cat > version.json << EOF
          {
            "version": "${VERSION}",
            "release_notes": "Version ${VERSION}",
            "windows": {
              "download_url": "https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/POD_Generate_IMG.exe",
              "sha256": "${WIN_SHA}"
            }
          }
          EOF

          sed -i 's/^          //' version.json

          echo "=== Updated version.json ==="
          cat version.json

      - name: Commit & push version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "ci: update version.json for ${{ steps.get_version.outputs.VERSION }}"
          git push origin HEAD:main

      - name: Keep latest 5 releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[5:] | .[].tagName' |
          while read TAG_NAME; do
            if [ -n "$TAG_NAME" ]; then
              echo "Deleting old release: $TAG_NAME"
              gh release delete "$TAG_NAME" --yes
            fi
          done
